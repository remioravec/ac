  <!-- Cap brim -->
  <path d="M200 115 C230 115, 260 118, 272 122 L270 128 C258 124, 230 121, 200 121 Z" fill="#037A91"/>

  <!-- Eyes -->
  <ellipse cx="182" cy="130" rx="5" ry="6" fill="#2C3E50"/>
  <ellipse cx="218" cy="130" rx="5" ry="6" fill="#2C3E50"/>
  <circle cx="184" cy="128" r="2" fill="white"/>
  <circle cx="220" cy="128" r="2" fill="white"/>

  <!-- Smile -->
  <path d="M185 148 C190 158, 210 158, 215 148" stroke="#C0392B" stroke-width="3" fill="none" stroke-linecap="round"/>

