  <path d="M210 120 C214 116, 222 116, 226 120" stroke="#5C3A1E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Water drops decoration -->
  <path d="M320 150 C320 140, 330 130, 330 140 C330 148, 320 155, 320 150 Z" fill="#3498DB" opacity="0.6"/>
  <path d="M340 180 C340 173, 347 166, 347 173 C347 179, 340 184, 340 180 Z" fill="#3498DB" opacity="0.4"/>
  <path d="M70 170 C70 160, 80 150, 80 160 C80 168, 70 175, 70 170 Z" fill="#3498DB" opacity="0.5"/>
  <path d="M55 210 C55 203, 62 196, 62 203 C62 209, 55 214, 55 210 Z" fill="#3498DB" opacity="0.3"/>

  <!-- Small tools/icons decoration -->
  <!-- Gear -->
  <circle cx="330" cy="320" r="15" fill="none" stroke="#0490AC" stroke-width="3" opacity="0.3"/>
  <circle cx="330" cy="320" r="6" fill="none" stroke="#0490AC" stroke-width="2" opacity="0.3"/>

  <!-- Pipe icon -->
  <path d="M60 300 L60 330 L90 330" stroke="#0490AC" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Text banner -->
  <rect x="100" y="455" width="200" height="35" rx="17" fill="#0490AC"/>
  <text x="200" y="478" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">VOTRE ARTISAN DE CONFIANCE</text>
</svg>