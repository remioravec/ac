  <rect x="210" y="340" width="35" height="90" rx="8" fill="#245270"/>

  <!-- Shoes -->
  <ellipse cx="172" cy="432" rx="25" ry="12" fill="#1A3A4A"/>
  <ellipse cx="227" cy="432" rx="25" ry="12" fill="#153348"/>

