  <rect x="80" y="270" width="45" height="10" rx="3" fill="#E74C3C"/>
  <rect x="75" y="265" width="12" height="20" rx="2" fill="#C0392B"/>

  <!-- Right hand with thumbs up -->
  <circle cx="292" cy="280" r="12" fill="#F4C5A0"/>
  <rect x="288" y="258" width="8" height="20" rx="4" fill="#F4C5A0"/>

